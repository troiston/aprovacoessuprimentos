# Swarm + Traefik + Portainer (Compose path: docker-compose.yml)
#
# Alinhado à convenção deste cluster: rede overlay `network_swarm_public`,
# entrypoint `websecure`, certresolver `letsencryptresolver` (como n8n no mesmo servidor).
#
# Portainer → Stack → Environment:
#   APP_IMAGE = imagem existente no registry (ex.: docker.io/teuuser/aprovasuprimentos:latest)
#   NEXT_PUBLIC_APP_URL = https://aprovasuprimentos.digaola.com

version: "3.8"

networks:
  network_swarm_public:
    name: network_swarm_public
    external: true

services:
  web:
    image: ${APP_IMAGE}
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AprovacoesSuprimentos}
      NODE_ENV: production
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-}
      # Opcionais — ver .env.example
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      # SKIP_PRISMA_MIGRATE: "1"
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.routers.aprovasuprimentos.rule=Host(`aprovasuprimentos.digaola.com`)
        - traefik.http.routers.aprovasuprimentos.entrypoints=websecure
        - traefik.http.routers.aprovasuprimentos.tls.certresolver=letsencryptresolver
        - traefik.http.routers.aprovasuprimentos.service=aprovasuprimentos
        - traefik.http.services.aprovasuprimentos.loadbalancer.server.port=3000
        - traefik.http.services.aprovasuprimentos.loadbalancer.passHostHeader=true
