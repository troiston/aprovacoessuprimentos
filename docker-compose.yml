# Swarm + Traefik. Portainer (Git): Compose path = docker-compose.yml
# Ajuste: image, rede Traefik, Host(), entrypoints e certresolver.

version: "3.8"

networks:
  traefik-public:
    external: true

services:
  web:
    image: registry.example.com/aprovacoes-suprimentos:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AprovacoesSuprimentos}
      NODE_ENV: production
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY:-}
      # Opcionais — ver .env.example
      # STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      # STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      # SKIP_PRISMA_MIGRATE: "1"
    networks:
      - traefik-public
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik-public
        - traefik.http.routers.aprovacoes.rule=Host(`aprovacoes.exemplo.com`)
        - traefik.http.routers.aprovacoes.entrypoints=websecure
        - traefik.http.routers.aprovacoes.tls.certresolver=letsencrypt
        - traefik.http.routers.aprovacoes.service=aprovacoes
        - traefik.http.services.aprovacoes.loadbalancer.server.port=3000
